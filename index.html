<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parcial Programación Web 2</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="contenedor">

    <h1>Parcial Programación Web 2</h1>

    <!-- EJERCICIO 1 -->
    <div class="card">

      <h2>Evaluar Nota</h2>

      <input type="number" id="nota" placeholder="Ingrese una nota">

      <button onclick="mostrarNota()">
        Evaluar
      </button>

      <div class="resultado" id="resultadoNota"></div>

    </div>

    <!-- EJERCICIO 2 -->
    <div class="card">

      <h2>Tabla de Multiplicar</h2>

      <input type="number" id="numeroTabla" placeholder="Ingrese un número">

      <button onclick="mostrarTabla()">
        Mostrar Tabla
      </button>

      <div class="resultado" id="resultadoTabla"></div>

    </div>

    <!-- EJERCICIO 3 -->
    <div class="card">

      <h2>Analizar Número</h2>

      <input type="number" id="numeroAnalizar" placeholder="Ingrese un número">

      <button onclick="mostrarAnalisis()">
        Analizar
      </button>

      <div class="resultado" id="resultadoAnalisis"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
